server {
    listen 80 default_server;
    listen [::]:80;
    server_name opensales.uz www.opensales.uz;

    # HTTPS ga redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name opensales.uz www.opensales.uz;

    root /var/www/saleflow/public;
    index index.php;

    # SSL (certbot yoki boshqa usul bilan olingan sertifikatlar)
    ssl_certificate     /etc/letsencrypt/live/opensales.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opensales.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSL — strong settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security header lar
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.indexnow.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Gzip — yumshoq compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/xhtml+xml
        application/x-javascript
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # Statik fayllar uchun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Webhook endpoint — alohida sozlash (tez javob kerak)
    location /webhook/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Telegram 60s timeout beradi
        fastcgi_read_timeout 30s;
    }

    # Laravel uchun asosiy location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeout
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 60s;

        # Header buffer (Inertia, session cookie kattaroq bo'lganda 502 oldini olish)
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
    }

    # .env va boshqa maxfiy fayllarni bloklash
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # vendor va node_modules ga kirishni bloklash
    location ~ ^/(vendor|node_modules)/ {
        deny all;
    }

    # Log fayllar
    access_log /var/log/nginx/dealer-bot-access.log;
    error_log  /var/log/nginx/dealer-bot-error.log warn;

    # Upload hajmi (bitta requestda bir nechta file yuklash uchun)
    client_max_body_size 100M;
}
