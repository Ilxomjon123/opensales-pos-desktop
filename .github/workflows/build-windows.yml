name: Build Windows installer

# OpenSales POS — offline desktop app uchun Windows .exe installer.
# NativePHP (Electron) Windows build'ni faqat Windows muhitida qura oladi,
# shuning uchun bu workflow windows-latest runner'da ishlaydi.

on:
  push:
    tags:
      - 'v*'          # v1.0.0 kabi teg push qilinganda release quriladi
  workflow_dispatch:   # qo'lda ham ishga tushirish mumkin

permissions:
  contents: write       # release'ga artifact yuklash uchun

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, curl, dom, fileinfo, gd, iconv, intl, mbstring, openssl, pdo_sqlite, sodium, sqlite3, tokenizer, xml, xmlwriter, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_PROCESS_TIMEOUT: 0

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

      - name: Prepare app (key + env)
        run: |
          copy .env.example .env
          php artisan key:generate --force

      - name: Build Windows app
        run: php artisan native:build win
        env:
          COMPOSER_PROCESS_TIMEOUT: 0

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensales-pos-windows
          path: dist/*[Ss]etup*.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*[Ss]etup*.exe
